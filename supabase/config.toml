# Supabase CLI config. For hosted use: `supabase link --project-ref <ref>` then
# `supabase db push`. For local dev: `supabase start` then `supabase db reset`.
project_id = "ngjfi-platform"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Add your deploy + custom-domain URLs here so magic-link / OTP redirects work:
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
